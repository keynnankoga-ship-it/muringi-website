<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | A Love Diary</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #E5E5E5; font-family: 'Poppins', sans-serif; color: #000; }
    #adminContent { display: none; margin: 2rem; }

    .admin-section { margin-bottom: 3rem; }
    .admin-section h2 { margin-bottom: 1rem; }

    .admin-horizontal-container {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 15px;
      padding: 10px 0;
    }

    .item { flex: 0 0 auto; text-align: center; }

    .song-item { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }

    .gallery-item { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; }

    #adminLoginForm { max-width: 400px; margin: 5rem auto; padding: 2rem; background: #F5F0E1; border-radius: 20px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); text-align: center; }
    #adminLoginForm input { padding: 0.5rem; margin: 0.5rem 0; width: 80%; border-radius: 5px; border: 1px solid #ccc; }
    #adminLoginForm button { padding: 0.5rem 1rem; border: none; background: #A89F91; color: #fff; border-radius: 5px; font-weight: bold; }

    button { cursor: pointer; }

    input, textarea { width: 90%; padding: 5px; margin-bottom: 0.5rem; border-radius: 5px; border: 1px solid #ccc; }

    form button { background: #A89F91; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

    .item button.delete-btn {
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 5px 10px;
      cursor: pointer;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <!-- Admin Login Form -->
  <form id="adminLoginForm">
    <h2>Admin Login</h2>
    <input type="password" id="adminPassword" placeholder="Enter Admin Password" required>
    <button type="submit">Login</button>
  </form>

  <!-- Admin Content -->
  <div id="adminContent">

    <!-- Date Ideas Management -->
    <div class="admin-section" id="dateIdeasSection">
      <h2>Manage Date Ideas</h2>
      <form id="addDateIdeaForm">
        <input type="text" name="title" placeholder="Title" required>
        <textarea name="description" placeholder="Description"></textarea>
        <button type="submit">Add Date Idea</button>
      </form>
      <div id="adminDateIdeas" class="admin-horizontal-container"></div>
    </div>

    <!-- Songs Management -->
    <div class="admin-section" id="songsSection">
      <h2>Manage Songs</h2>
      <form id="addSongForm" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="Song Title" required>
        <input type="text" name="artist" placeholder="Artist" required>
        <input type="file" name="song" accept="audio/*" required>
        <button type="submit">Add Song</button>
      </form>
      <div id="adminSongs" class="admin-horizontal-container"></div>
    </div>

    <!-- Gallery Management -->
    <div class="admin-section" id="gallerySection">
      <h2>Manage Gallery Photos</h2>
      <form id="addGalleryForm" enctype="multipart/form-data">
        <input type="file" name="gallery" accept="image/*" required>
        <button type="submit">Add Gallery Item</button>
      </form>
      <div id="adminGallery" class="admin-horizontal-container"></div>
    </div>

  </div>

  <script src="admin.js"></script>
</body>
</html>
